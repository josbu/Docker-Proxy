## 把 your_domain_name 换成你的域名；证书路径按需修改。

## docker hub
server {
    listen       80;
    listen       443 ssl;
    server_name  hub.your_domain_name;
    ssl_certificate your_domain_name.crt;
    ssl_certificate_key your_domain_name.key;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;
    ssl_buffer_size 8k;

    proxy_connect_timeout 600;
    proxy_send_timeout    600;
    proxy_read_timeout    600;
    send_timeout          600;

    # 拒绝访问 Go 代理管理 API（/-/ 路径）；管理端口仅内网 5001 提供，此处二次防护
    location ~ ^/-/ {
        return 404;
    }

    location / {
        proxy_pass   http://localhost:50000;
        proxy_set_header Host docker.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Nginx-Proxy true;
        proxy_buffering off;       # 关键：关闭缓冲，避免大镜像层在 nginx 落盘
        proxy_request_buffering off;
        proxy_redirect off;
    }
}

