# ============================================================
#  使用： docker compose -f docker-compose-build.yaml up -d
# ============================================================

services:
  go-proxy:
    container_name: reg-go-proxy
    build:
      context: ./go-proxy
      dockerfile: Dockerfile
    restart: always
    environment:
      - OTEL_TRACES_EXPORTER=none
      - GO_PROXY_ADMIN_TOKEN=${GO_PROXY_ADMIN_TOKEN:-change-me-to-a-strong-random-token}
      # 如需通过本地代理访问上游，可设置：
      # - HTTP_PROXY=http://host:port
      # - HTTPS_PROXY=http://host:port
    volumes:
      # 配置持久化：宿主机目录挂载，容器内配置在 /app/config.d/config.yaml
      - ./config/go-proxy:/app/config.d
    ports:
      - 50000:5000
    networks:
      - registry-net

  hubcmd-ui:
    container_name: hubcmd-ui
    build:
      context: ./hubcmdui
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - go-proxy
    environment:
      # 指向 go-proxy 的管理端口
      - GO_PROXY_ADMIN_URL=http://go-proxy:5001
      - GO_PROXY_ADMIN_TOKEN=${GO_PROXY_ADMIN_TOKEN:-change-me-to-a-strong-random-token}
      # 真实宿主机名
      - HOST_NAME=${HOST_NAME:-}
      - SECURE_COOKIE=false
      # HTTP代理配置（按需开启）
      # - HTTP_PROXY=http://proxy.example.com:8080
      # - HTTPS_PROXY=https://proxy.example.com:8080
      # - NO_PROXY=localhost,127.0.0.1,.local
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # SQLite 数据库文件
      - ./hubcmdui/data:/app/data
    ports:
      - 30080:3000
    networks:
      - registry-net

networks:
  registry-net: